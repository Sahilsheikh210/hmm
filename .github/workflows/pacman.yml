name: Generate Pacman README Animation

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch: 

# Explicitly grant write permissions so the bot can push the SVG
permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Bumped to v4 to resolve the Node 20 deprecation warning
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Bumped to v4 to resolve the Node 20 deprecation warning
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Updated your node version to modern standards

      - name: Run Script to Generate SVG
        run: node generate.js

      - name: Commit and Push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pacman.svg
          git commit -m "Update Pac-Man animation" || exit 0
          git push
